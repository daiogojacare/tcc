<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="telaloginstyle.css">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"></script>
	<title>Tela de login</title>
</head>

<body>
	<header>
		<img src="fotos/IFC_logo.png" alt="Logo do IFC" class="logoifc">
		<h1>IFC-Sombrio</h1>
		<nav>
			<ul>
				<li><a href="homepage.html">Voltar</a></li>
			</ul>
		</nav>
	</header>
	<div class="login">
		<div class="tela-login">
			<div class="titulo">
				<h1>Bem-vindo!</h1>
				<p>Por favor faça login.</p>
			</div>
			<div class="form">
				<div class="campo">
					<input type="text" class="campo-login" value="" placeholder="Usúario" id="campo-usuario">
					<label class="login-field-icon fui-user" for="campo-usuario"></label>
				</div>
				<div class="campo">
					<input type="password" class="campo-login" value="" placeholder="Senha" id="campo-senha">
					<label class="login-field-icon fui-lock" for="campo-senha"></label>
				</div>
				<a class="btn btn-primary btn-large btn-block" href="#">Acessar</a>
				<a class="esqueci-senha" href="#">Esqueci minha senha</a>
			</div>
		</div>
	</div>
</body>

</html>
